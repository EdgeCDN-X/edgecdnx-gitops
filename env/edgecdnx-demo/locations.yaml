---
apiVersion: infrastructure.edgecdnx.com/v1alpha1
kind: Location
metadata:
  name: fra1-c1
  namespace: argocd
spec:
  fallbackLocations:
    - nyc1-c1
  geoLookup:
    attributes:
      geoip/continent/code:
        values:
          - value: EU
          - value: AF
          - value: AN
            weight: -900
          - value: NA
            weight: -900
          - value: OC
            weight: -900
          - value: SA
            weight: -900
          - value: AS
            weight: -900
        weight: 1000
      geoip/subdivisions/code:
        values:
          - value: "TC"
        weight: 100
    weight: 50
  alerts: []
    # - alertName: KubeJobFailed
    #   labels:
    #     cluster: "in-cluster"
    #     job_name: "liquibase-migration-29530200"    
  nodeGroups:
    - name: ssd
      flavor: ""
      nodes:
        - name: n1
          ipv4: 74.220.31.183
      nodeSelector:
        kubernetes.civo.com/civo-node-pool: fra1-c3
      cacheConfig:
        name: "ssd"
        path: "/var/cache/ssd"
        keysZone: "100m"
        inactive: "10080m"
        maxSize: "4096m"
    # - name: hdd
    #   nodes:
    #     - name: n2
    #       ipv4: 74.220.30.112
    #   nodeSelector:
    #     kubernetes.civo.com/civo-node-pool: fra1-hdd1
    #   cacheConfig:
    #     name: "hdd"
    #     path: "/var/cache/hdd"
    #     keysZone: "100m"
    #     inactive: "10080m"
    #     maxSize: "4096m"
---
apiVersion: infrastructure.edgecdnx.com/v1alpha1
kind: Location
metadata:
  name: nyc1-c1
  namespace: argocd
spec:
  fallbackLocations:
    - fra1-c1
  geoLookup:
    attributes:
      geoip/continent/code:
        values:
          - value: AN
          - value: NA
          - value: OC
          - value: SA
          - value: AS
          - value: EU
            weight: -900
          - value: AF
            weight: -900
        weight: 1000
    weight: 50
  nodeGroups:
    - name: ssd
      flavor: ""
      nodes:
        - name: n1
          ipv4: 74.220.24.46
      nodeSelector:
        kubernetes.civo.com/civo-node-pool: nyc1-c2
      cacheConfig:
        name: "ssd"
        path: "/var/cache/ssd"
        keysZone: "100m"
        inactive: "10080m"
        maxSize: "4096m"
    - name: ssd
      flavor: lg
      nodes:
        - name: n2
          ipv4: 74.220.29.107
      nodeSelector:
        kubernetes.civo.com/civo-node-pool: nyc1-c3
      cacheConfig:
        name: "ssd"
        path: "/var/cache/ssd"
        keysZone: "100m"
        inactive: "10080m"
        maxSize: "4096m"